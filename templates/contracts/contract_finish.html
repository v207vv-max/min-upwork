{% extends "base.html" %}
{% load i18n %}
{% block title %}{% trans "Finish contract" %}{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-7"><div class="card border-success"><div class="card-body p-4">
    <h1 class="h3 text-success mb-3">{% trans "Finish contract" %}</h1>
    <p>{% trans "Are you sure you want to finish this contract?" %}</p>
    <div class="alert alert-light border"><strong>{{ contract.project.title }}</strong></div>
    <form method="post" class="d-flex gap-2">{% csrf_token %}<button type="submit" class="btn btn-success">{% trans "Finish contract" %}</button><a href="{% url 'contracts:contract-detail' contract.pk %}" class="btn btn-outline-secondary">{% trans "Back" %}</a></form>
</div></div></div></div>
{% endblock %}
